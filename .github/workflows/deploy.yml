name: Deploy to WordPress.org

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip actual SVN commit)'
        required: false
        type: boolean
        default: true

jobs:
  deploy:
    name: Publish to WordPress.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: multi-block-styles
        with:
          dry-run: ${{ inputs.dry-run }}

  upload-release-asset:
    name: Upload release ZIP
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create plugin ZIP
        run: |
          mkdir -p multi-block-styles
          cp -r build/ multi-block-styles/build/
          cp multi-block-styles.php multi-block-styles/
          cp readme.txt multi-block-styles/
          zip -r multi-block-styles.zip multi-block-styles/

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: multi-block-styles.zip
