name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create release ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create plugin ZIP
        run: |
          rsync -av --exclude-from=.distignore --exclude='multi-block-styles' . multi-block-styles/
          zip -r multi-block-styles.zip multi-block-styles/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: multi-block-styles.zip
          generate_release_notes: true
